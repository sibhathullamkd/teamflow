<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Planr — Your Smart Workspace</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --surface2: #18181f;
      --border: rgba(255,255,255,0.07);
      --accent: #6c63ff;
      --accent2: #a78bfa;
      --accent-glow: rgba(108,99,255,0.35);
      --text: #f0f0f8;
      --muted: #6b6b80;
      --danger: #ff4d6d;
      --success: #34d399;
      --font-display: 'Syne', sans-serif;
      --font-body: 'DM Sans', sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      overflow: hidden;
    }

    /* Animated background */
    .bg-canvas {
      position: fixed; inset: 0; z-index: 0;
      background: var(--bg);
    }
    .bg-orb {
      position: absolute; border-radius: 50%;
      filter: blur(80px); opacity: 0.18;
      animation: drift 12s ease-in-out infinite alternate;
    }
    .bg-orb-1 { width: 500px; height: 500px; background: var(--accent); top: -150px; left: -100px; animation-delay: 0s; }
    .bg-orb-2 { width: 400px; height: 400px; background: #8b5cf6; bottom: -100px; right: -80px; animation-delay: -4s; }
    .bg-orb-3 { width: 300px; height: 300px; background: #3b82f6; top: 40%; left: 50%; animation-delay: -8s; }

    @keyframes drift {
      from { transform: translate(0,0) scale(1); }
      to { transform: translate(30px, 20px) scale(1.08); }
    }

    /* Grid overlay */
    .bg-grid {
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 48px 48px;
    }

    /* Main layout */
    .page {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .auth-wrap {
      display: flex;
      width: 100%;
      max-width: 960px;
      min-height: 560px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 40px 120px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.04);
      animation: slideUp 0.6s cubic-bezier(0.16,1,0.3,1);
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(32px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Left brand panel */
    .brand-panel {
      width: 45%;
      background: linear-gradient(135deg, rgba(108,99,255,0.15) 0%, rgba(139,92,246,0.08) 100%);
      border-right: 1px solid var(--border);
      padding: 48px 40px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: relative;
      overflow: hidden;
    }
    .brand-panel::before {
      content: '';
      position: absolute;
      top: -60px; right: -60px;
      width: 240px; height: 240px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(108,99,255,0.2) 0%, transparent 70%);
    }

    .logo {
      display: flex; align-items: center; gap: 12px;
    }
    .logo-mark {
      width: 40px; height: 40px;
      background: var(--accent);
      border-radius: 12px;
      display: grid; place-items: center;
      font-size: 18px;
    }
    .logo-text {
      font-family: var(--font-display);
      font-size: 22px; font-weight: 800;
      letter-spacing: -0.5px;
    }

    .brand-headline {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 40px 0;
    }
    .brand-headline h1 {
      font-family: var(--font-display);
      font-size: 36px;
      font-weight: 800;
      line-height: 1.15;
      letter-spacing: -1px;
      margin-bottom: 16px;
    }
    .brand-headline h1 span { color: var(--accent2); }
    .brand-headline p {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }

    .feature-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .feature-item {
      display: flex; align-items: center; gap: 10px;
      font-size: 13px; color: var(--muted);
    }
    .feature-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
    }

    /* Right form panel */
    .form-panel {
      flex: 1;
      padding: 48px 44px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .form-header {
      margin-bottom: 32px;
    }
    .form-header h2 {
      font-family: var(--font-display);
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 6px;
    }
    .form-header p { color: var(--muted); font-size: 14px; }

    .tab-switcher {
      display: flex;
      background: var(--surface2);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 28px;
      gap: 4px;
    }
    .tab-btn {
      flex: 1;
      padding: 9px;
      border: none;
      background: transparent;
      color: var(--muted);
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 500;
      border-radius: 7px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .tab-btn.active {
      background: var(--accent);
      color: #fff;
    }

    .form-group { margin-bottom: 16px; }
    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .form-input {
      width: 100%;
      padding: 12px 16px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }
    .form-input::placeholder { color: #3a3a50; }

    .btn-primary {
      width: 100%;
      padding: 13px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: var(--font-body);
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 24px var(--accent-glow);
      position: relative;
      overflow: hidden;
    }
    .btn-primary:hover { opacity: 0.88; transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Loading spinner in button */
    .btn-primary .spinner {
      display: none;
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
    }
    .btn-primary.loading .spinner { display: block; }
    .btn-primary.loading .btn-text { opacity: 0; }
    @keyframes spin { to { transform: translate(-50%, -50%) rotate(360deg); } }

    .alert {
      padding: 11px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-top: 12px;
      display: none;
    }
    .alert.error { background: rgba(255,77,109,0.12); color: var(--danger); border: 1px solid rgba(255,77,109,0.25); }
    .alert.success { background: rgba(52,211,153,0.12); color: var(--success); border: 1px solid rgba(52,211,153,0.25); }
    .alert.show { display: block; }

    /* Form visibility */
    .auth-form { display: none; }
    .auth-form.active { display: block; }

    @media (max-width: 680px) {
      .auth-wrap { flex-direction: column; max-height: 90vh; overflow-y: auto; }
      .brand-panel { width: 100%; padding: 28px 24px; min-height: auto; }
      .brand-headline { padding: 16px 0; }
      .brand-headline h1 { font-size: 24px; }
      .feature-list { display: none; }
      .form-panel { padding: 28px 24px; }
    }
  </style>
</head>
<body>

<div class="bg-canvas">
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>
  <div class="bg-orb bg-orb-3"></div>
</div>
<div class="bg-grid"></div>

<div class="page">
  <div class="auth-wrap">

    <!-- Brand Panel -->
    <div class="brand-panel">
      <div class="logo">
        <div class="logo-mark">📋</div>
        <span class="logo-text">Planr</span>
      </div>

      <div class="brand-headline">
        <h1>Your ideas,<br><span>organized.</span></h1>
        <p>A smart workspace for notes, tasks, and planning — accessible from any device, any time.</p>
      </div>

      <div class="feature-list">
        <div class="feature-item"><div class="feature-dot"></div>Rich notes with categories</div>
        <div class="feature-item"><div class="feature-dot"></div>Task manager with priorities</div>
        <div class="feature-item"><div class="feature-dot"></div>Daily planner & calendar</div>
        <div class="feature-item"><div class="feature-dot"></div>Sync across all devices</div>
        <div class="feature-item"><div class="feature-dot"></div>Secure cloud storage</div>
      </div>
    </div>

    <!-- Form Panel -->
    <div class="form-panel">
      <div class="form-header">
        <h2 id="form-title">Welcome back</h2>
        <p id="form-subtitle">Sign in to your workspace</p>
      </div>

      <div class="tab-switcher">
        <button class="tab-btn active" onclick="switchTab('login')">Sign In</button>
        <button class="tab-btn" onclick="switchTab('signup')">Create Account</button>
      </div>

      <!-- Login Form -->
      <div id="login-form" class="auth-form active">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" id="login-email" class="form-input" placeholder="you@example.com" />
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" id="login-password" class="form-input" placeholder="••••••••" />
        </div>
        <button class="btn-primary" id="login-btn" onclick="handleLogin()">
          <span class="btn-text">Sign In</span>
          <div class="spinner"></div>
        </button>
        <div class="alert" id="login-alert"></div>
      </div>

      <!-- Signup Form -->
      <div id="signup-form" class="auth-form">
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input type="text" id="signup-name" class="form-input" placeholder="Your name" />
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" id="signup-email" class="form-input" placeholder="you@example.com" />
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" id="signup-password" class="form-input" placeholder="Min. 6 characters" />
        </div>
        <button class="btn-primary" id="signup-btn" onclick="handleSignup()">
          <span class="btn-text">Create Account</span>
          <div class="spinner"></div>
        </button>
        <div class="alert" id="signup-alert"></div>
      </div>

    </div>
  </div>
</div>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
